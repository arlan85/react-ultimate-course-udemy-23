services:
  db:
    image: public.ecr.aws/supabase/postgres:17.6.1.106
    pull_policy: if_not_present
    container_name: wild_oasis_db
    restart: unless-stopped
    ports:
      - "54332:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - wild_oasis_db_data:/var/lib/postgresql/data

  meta:
    image: public.ecr.aws/supabase/postgres-meta:v0.96.4
    pull_policy: if_not_present
    container_name: wild_oasis_meta
    restart: unless-stopped
    ports:
      - "55426:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    depends_on:
      - db

  rest:
    image: public.ecr.aws/supabase/postgrest:v12.2.8
    pull_policy: if_not_present
    container_name: wild_oasis_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: 919f9ccee2951600d8bcfefc92dba9636666d1ad20f763d0bd10e906f6124b0c
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      - db

  auth:
    image: public.ecr.aws/supabase/gotrue:v2.164.0
    pull_policy: if_not_present
    container_name: wild_oasis_auth
    restart: unless-stopped
    ports:
      - "54331:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:55421
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://127.0.0.1:3000
      GOTRUE_URI_ALLOW_LIST: http://127.0.0.1:3000,http://localhost:3000
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: 919f9ccee2951600d8bcfefc92dba9636666d1ad20f763d0bd10e906f6124b0c
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@wildoasis.com
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    depends_on:
      - db

  api:
    image: nginx:alpine
    pull_policy: if_not_present
    container_name: wild_oasis_api
    restart: unless-stopped
    ports:
      - "55421:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rest
      - auth

  studio:
    image: public.ecr.aws/supabase/studio:2026.04.28-sha-89d08a2
    pull_policy: if_not_present
    container_name: wild_oasis_studio
    restart: unless-stopped
    ports:
      - "55423:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_NAME: Wild Oasis
      DEFAULT_PROJECT_NAME: Wild Oasis
      SUPABASE_URL: http://localhost:55421
      SUPABASE_PUBLIC_URL: http://localhost:55421
    depends_on:
      - meta

volumes:
  wild_oasis_db_data: